<!DOCTYPE html>
<html>
<head>
<title>bozo</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">

<style>
	#searching, #random_text {
	font-family: 'Poppins', sans-serif;
	font-size: 24px;
	}
	

	
</style>
<script>
const messageArray = [
  "Accessing database...",
  "Hacking into the firewall...",
  "Taking coffee break...",
  "Reading metadata...",
  "Altering byte packets...",
  "Copying buffer to memory...",
  "Installing Windows update... This may take a few hours.",
  "Disposing of bad sectors...",
  "Waiting for 192.168.12.256 to ping...",
  "Dramatic!"
];

function addTrailingDots() {
  const searchingElement = document.getElementById("searching");
  let dotsCount = 0;
  let dotCount = 0;
  let dotLimit = Math.floor(Math.random() * 4) + 1;
  const maxDots = 3;
  const messageDiv = document.getElementById("random_text");

  function updateText() {
    searchingElement.textContent = "Searching" + ".".repeat(dotsCount);
    dotsCount = (dotsCount + 1) % (maxDots + 1);  // Reset after 3 dots
    
    dotCount++;
    if (dotCount >= dotLimit) {
      dotCount = 0;
      dotLimit = Math.floor(Math.random() * 4) + 1;

      // Pick a random message and add it to the div
      let randomMessage = messageArray[Math.floor(Math.random() * messageArray.length)];
      messageDiv.textContent += <br> + randomMessage;
    }
  }

  setInterval(updateText, 1000); // Update every second
}

window.onload = addTrailingDots;

  </script>
</head>

<body>
<div id="searching">Searching</div>
<div id="random_text"></div>
</body>
</html>
