function addTrailingDots() {
  const searchingElement = document.getElementById("searching");
  let dotsCount = 0;
  let dotCount = 0;
  let dotLimit = Math.floor(Math.random() * 4) + 1;
  const maxDots = 3;
  const messageDiv = document.getElementById("random_message");

  function updateText() {
    searchingElement.textContent = "Searching" + ".".repeat(dotsCount);
    dotsCount = (dotsCount + 1) % (maxDots + 1);  // Reset after 3 dots
    
    dotCount++;
    if (dotCount >= dotLimit) {
      dotCount = 0;
      dotLimit = Math.floor(Math.random() * 4) + 1;

      // Pick a random message and add it to the div
      let randomMessage = messageArray[Math.floor(Math.random() * messageArray.length)];
      messageDiv.innerHTML += "<br>" + randomMessage;
    }
  }

  setInterval(updateText, 1000); // Update every second
}

window.onload = addTrailingDots;
