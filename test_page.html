<!DOCTYPE html>
<html>
<head>
<title>test</title>
<script>
	let counterAmount = 0;	
	function addOne() {
		const counterDiv = document.getElementById("counter");
		counterAmount++;
		
		counterDiv.textContent = counterAmount;
	}

</script>
</head>



<body>

<button type="button" onclick="addOne()">Click me!</button>
<div id="counter">0</div>
</body>

</html>
