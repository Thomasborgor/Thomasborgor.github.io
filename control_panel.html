<!DOCTYPE html>
<html>
<head>
<title>Control Panel</title>
<meta name="viewport" content="width=device-width, height=device-height, initial-scale=1">
<style>
	* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background-color: black;
    position: relative; /* Ensures relative positioning for child elements */
}

/* Background Image */
#backgroundImage {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
    transition: transform 0.3s ease;
}

/* Title */
h1 {
    background-color: rgba(255, 255, 255, 0.4);
    width: 100%;
    text-align: center;
    padding: 1vh;
    font-size: clamp(1.5rem, 3vw, 2.5rem); /* Responsive text */
}

/* Speedometer */
.speedometer {
    position: absolute;
    left: 10%;
    bottom: 4%;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.speedometer #speedometer_value {
    font-size: clamp(1.5rem, 2.3vw, 2rem);
    color: white;
	margin-left: -60vw;
	margin-bottom: -26vh;
	z-index: 30;
}

.speedometer img {
    width: clamp(120px, 20vw, 320px); /* Dynamic resizing */
    height: auto;
	margin-left: -60vw;
	margin-bottom: -4vh;
}


/* Speed Buttons */
#upButton, #downButton {
    font-size: clamp(1rem, 2vw, 1.5rem);
    padding: 0.5rem 1rem;
    margin-top: 0.5rem;
	margin-left: -60vw;
}

/* Rotation Buttons */
.rotation-buttons {
    position: absolute;
    left: 31%;
    bottom: 50%;
    display: flex;
    flex-direction: row;
    gap: 1rem;
}

.rotation-buttons button {
    font-size: clamp(1rem, 2vw, 1.5rem);
    padding: 0.5rem 1rem;
}

/* Lightswitch */
#lightswitch {
    position: absolute;
    right: 7%;
    bottom: 50%;
    font-size: clamp(1rem, 2vw, 1.5rem);
    padding: 0.5rem 1rem;
}

/* Exit Button */
#exit_ufo {
    position: absolute;
    right: 5%;
    bottom: 5%;
    font-size: clamp(1rem, 2vw, 1.5rem);
    padding: 0.5rem 1rem;
}

/* 📱 Mobile Adjustments */
@media (max-width: 768px) {
    .speedometer {
        left: 5%;
        bottom: 10%;
    }

    .rotation-buttons {
        left: 20%;
        bottom: 40%;
    }

    #lightswitch {
        right: 5%;
        bottom: 40%;
    }

    #exit_ufo {
        right: 5%;
        bottom: 10%;
    }
}


</style>
<script>
	let rotationDegree = 0;

	function rotateBackgroundLeft() {
		rotationDegree -= 2; // Rotate left by 2 degrees
		document.getElementById("backgroundImage").style.transform = `rotate(${rotationDegree}deg)`; // Apply image rotation
	}

	function rotateBackgroundRight() {
		rotationDegree += 2; // Rotate right by 2 degrees
		document.getElementById("backgroundImage").style.transform = `rotate(${rotationDegree}deg)`; // Apply image rotation
	}

	let speed = 25;
	function increaseSpeed() {
		speed++;
		document.getElementById("speedometer_value").textContent = speed;
	}

	function decreaseSpeed() {
		speed--;
		document.getElementById("speedometer_value").textContent = speed;
	}
</script>
</head>

<body>
<h1>Welcome to the Boss's UFO!</h1>
<div class="speedometer">
	<p id="speedometer_value">25</p>
	<img src="speed.jpg" alt="placeholder" style="width: 20%; height: 20%; ">
	<button type="button" id="upButton" onclick="increaseSpeed()">Faster</button>
	<button type="button" id="downButton" onclick="decreaseSpeed()">Slower</button>
</div>

<div class="rotation-buttons">
	<button type="button" onclick="rotateBackgroundLeft()">Turn Left</button>
	<button type="button" onclick="rotateBackgroundRight()">Turn Right</button>
</div>

<!-- Image to rotate -->
<img id="backgroundImage" src="ufo.jpg" alt="Background Image">
<button type="button" id="lightswitch" onclick="alert('its broken')">Lightswitch</button>
<button type="button" id="exit_ufo" onclick="window.location.href = 'index.html'">Leave UFO</button>
</body>
</html>
