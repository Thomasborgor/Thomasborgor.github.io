<!DOCTYPE html>
<html>
<head>
<title>Control Panel</title>
<style>
	body {
		display: flex;
		position: fixed;
		width: 100%;
		height: 100%;
		overflow: hidden;
		background-color: black;
	}

	/* Image positioned behind content */
	#backgroundImage {
		position: absolute;
		top: -0.95%;
		left: -0.59%;
		width: 100%;
		height: 100%;
		object-fit: cover;
		z-index: -1; /* Place image behind content */
		transition: transform 0.3s ease; /* Smooth transition for rotation */
		
	}

	h1 {
		background-color: rgba(255, 255, 255, 0.4);
		display: flex;
		position: relative;
		height: 5.5%;
	}

	.speedometer {
		position: absolute;
		display: flex;
		left: 10%;
		bottom: 4%;
	}

	.speedometer p {
		position: absolute;
		display: flex;
		font-size: 20px;
		color: white;
		bottom: 20%;
		left: 9.3%;
	}

	.speedometer #upButton {
		position: absolute;
		display: flex;
		font-size: 20px;
		color: black;
		bottom: 20%;
		left: 1.4%;
	}
	.speedometer #downButton {
		position: absolute;
		display: flex;
		font-size: 20px;
		color: black;
		bottom: 20%;
		left: 12%;
	}

	.rotation-buttons {
		position: absolute;
		bottom: 50%;

		left: 31%;
	}

	.rotation-buttons button {
		font-size: 20px;
	}
	
	#lightswitch {
		position: absolute;
		right: 7%;
		bottom: 50%;
		font-size: 20px;
	}
	
	#exit_ufo {
		position: absolute;
		right: 5%;
		bottom: 5%;
		font-size: 20px;
		
	}
	
</style>
<script>
	let rotationDegree = 0;

	function rotateBackgroundLeft() {
		rotationDegree -= 2; // Rotate left by 2 degrees
		document.getElementById("backgroundImage").style.transform = `rotate(${rotationDegree}deg)`; // Apply image rotation
	}

	function rotateBackgroundRight() {
		rotationDegree += 2; // Rotate right by 2 degrees
		document.getElementById("backgroundImage").style.transform = `rotate(${rotationDegree}deg)`; // Apply image rotation
	}

	let speed = 25;
	function increaseSpeed() {
		speed++;
		document.getElementById("speedometer_value").textContent = speed;
	}

	function decreaseSpeed() {
		speed--;
		document.getElementById("speedometer_value").textContent = speed;
	}
</script>
</head>

<body>
<h1>Welcome to the Boss's UFO!</h1>
<div class="speedometer">
	<p id="speedometer_value">25</p>
	<img src="speed.jpg" alt="placeholder" style="width: 20%; height: 20%; ">
	<button type="button" id="upButton" onclick="increaseSpeed()">Faster</button>
	<button type="button" id="downButton" onclick="decreaseSpeed()">Slower</button>
</div>

<div class="rotation-buttons">
	<button type="button" onclick="rotateBackgroundLeft()">Turn Left</button>
	<button type="button" onclick="rotateBackgroundRight()">Turn Right</button>
</div>

<!-- Image to rotate -->
<img id="backgroundImage" src="ufo.jpg" alt="Background Image">
<button type="button" id="lightswitch" onclick="alert('its broken')">Lightswitch</button>
<button type="button" id="exit_ufo" onclick="window.location.href = 'index.html'">Leave UFO</button>
</body>
</html>
