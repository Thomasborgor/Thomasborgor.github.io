<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A's Bar and Grill</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
	<style>
		
	body {	
		font-family: 'Poppins', sans-serif;
        text-align: center; /* Centers all text */
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh; /* Ensures full height centering */
        margin: 0;
		width: 100%;
	}
	
	.first_part {
		display: flex;
		justify-content: space-between;
		align-items: center;
		height: 100vh;
		margin: 0;
	}
	.image {
		flex: 1;
		max-width: 50%;
		text-align: center;
	}
	
	.side_text {
		flex: 1;
		padding: 20px;
		max-width: 50%;
	}
	
	img {
		max-width: 100%;
		height: auto;
	}
	
		
	</style>
</head>

<body>

<div class="first_part">
	<div class="image">
		<img src="man.jpg" alt="Boss man">
	</div>
	<div class="side_text">
		<h1>Welcome new hires!</h1>
		<p>We at A's Bar and Grill are happy to have new hires here.<br>
	</div>
</div>

</body>


</html>
